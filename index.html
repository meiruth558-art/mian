<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H排版编辑工具 — 一键排版网络编辑器</title>
<meta name="description" content="H排版 - 一键自动格式化清除网络文章，支持MAC和Windows系统，免注册登陆，免安装，打开网页即可轻松在线一键排版。">
<meta name="keywords" content="一键排版,网络编辑,排版工具,格式化,文章排版,在线排版">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", "WenQuanYi Micro Hei", sans-serif;
    background: #f5f5f5;
    color: #333;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ============ HEADER ============ */
  .header {
    background: #fff;
    border-bottom: 3px solid #27ae60;
    padding: 20px 0;
  }

  .header-inner {
    max-width: 1160px;
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    align-items: flex-start;
    gap: 30px;
    flex-wrap: wrap;
  }

  .header h1 {
    font-size: 32px;
    color: #27ae60;
    font-weight: bold;
    white-space: nowrap;
    letter-spacing: 1px;
  }

  .header-desc {
    font-size: 14px;
    color: #666;
    line-height: 1.8;
    padding-top: 6px;
  }

  /* ============ MAIN CONTAINER ============ */
  .main {
    max-width: 1160px;
    margin: 24px auto;
    padding: 0 20px;
  }

  /* ============ OPTIONS BAR ============ */
  .options-bar {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  .options-left {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .option-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 14px;
    color: #555;
    cursor: pointer;
    user-select: none;
  }

  .option-item input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: #27ae60;
    cursor: pointer;
  }

  .options-right {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 8px 20px;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); }

  .btn-green { background: #27ae60; color: #fff; }
  .btn-blue { background: #3498db; color: #fff; }
  .btn-orange { background: #e67e22; color: #fff; }

  /* ============ EDITOR AREA ============ */
  .editor-wrapper {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  /* Toolbar */
  .toolbar {
    background: #f8f8f8;
    border-bottom: 1px solid #ddd;
    padding: 6px 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    align-items: center;
  }

  .toolbar-btn {
    width: 32px;
    height: 30px;
    border: 1px solid transparent;
    background: none;
    border-radius: 3px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #555;
    transition: all 0.15s;
    font-family: Georgia, serif;
  }

  .toolbar-btn:hover {
    background: #e8e8e8;
    border-color: #ccc;
  }

  .toolbar-sep {
    width: 1px;
    height: 24px;
    background: #ddd;
    margin: 0 4px;
    flex-shrink: 0;
  }

  .toolbar select {
    height: 28px;
    border: 1px solid #ccc;
    border-radius: 3px;
    font-size: 12px;
    color: #555;
    padding: 0 4px;
    background: #fff;
    cursor: pointer;
  }

  /* ===== EDITOR CONTENT - IFRAME APPROACH ===== */
  .editor-iframe-wrap {
    position: relative;
    min-height: 400px;
  }

  .editor-iframe-wrap iframe {
    width: 100%;
    min-height: 400px;
    border: none;
    display: block;
  }

  .editor-status {
    background: #f0f0f0;
    border-top: 1px solid #ddd;
    padding: 4px 12px;
    font-size: 12px;
    color: #999;
  }

  /* ============ BOTTOM BUTTONS ============ */
  .bottom-actions {
    text-align: center;
    margin-bottom: 30px;
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn-bottom {
    padding: 10px 28px;
    border: 1px solid #bbb;
    background: #f0f0f0;
    color: #555;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }

  .btn-bottom:hover {
    background: #e0e0e0;
    border-color: #999;
  }

  /* ============ INFO SECTION ============ */
  .info-section {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 30px;
    margin-bottom: 30px;
  }

  .info-section h2 {
    font-size: 26px;
    color: #333;
    margin-bottom: 14px;
    font-weight: normal;
  }

  .info-section p {
    font-size: 14px;
    color: #666;
    line-height: 1.8;
  }

  /* ============ FOOTER ============ */
  .footer {
    text-align: center;
    padding: 20px;
    border-top: 1px solid #e0e0e0;
    background: #fafafa;
    font-size: 13px;
    color: #999;
    line-height: 2;
  }

  .footer a { color: #27ae60; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
  .footer-links { margin-top: 4px; }
  .footer-links a { color: #3498db; margin: 0 6px; }

  /* ============ TOAST ============ */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: #27ae60;
    color: #fff;
    padding: 12px 28px;
    border-radius: 6px;
    font-size: 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    z-index: 9999;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 768px) {
    .header-inner { flex-direction: column; gap: 10px; }
    .header h1 { font-size: 24px; }
    .options-bar { flex-direction: column; align-items: flex-start; }
    .options-right { width: 100%; }
    .options-right .btn { flex: 1; text-align: center; }
    .info-section { padding: 20px; }
  }
</style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast">操作成功</div>

<!-- Header -->
<div class="header">
  <div class="header-inner">
    <h1>H排版编辑工具</h1>
    <div class="header-desc">
      H排版 - 一键自动格式化清除网络文章，支持MAC和Windows系统，免注册登陆，免安装，打开网页即可轻松在线一键排版，让网络编辑更轻松！欢迎分享！
    </div>

</div>

<!-- Main -->
<div class="main">

  <!-- Options Bar -->
  <div class="options-bar">
    <div class="options-left">

      <label class="option-item">
        <input type="checkbox" id="opt-indent"> 段前空格

    <div class="options-right">

      <button class="btn btn-orange" onclick="formatContent()">一键排版</button>

  <!-- Editor -->
  <div class="editor-wrapper">
    <!-- Toolbar -->
    <div class="toolbar">
      <button class="toolbar-btn" title="源码" onclick="toggleSource()">⟨/⟩</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" title="撤销" onclick="execCmd('undo')">↩</button>

      <div class="toolbar-sep"></div>

        <option value="p">正文</option>
      </select>
      <select onchange="execCmd('fontName', this.value); this.selectedIndex=0;" title="字体">
        <option value="">字体</option>
        <option value="Microsoft YaHei">微软雅黑</option>
        <option value="SimSun">宋体</option>
        <option value="SimHei">黑体</option>
        <option value="KaiTi">楷体</option>
        <option value="Arial">Arial</option>
        <option value="Georgia">Georgia</option>
      </select>
      <select onchange="execCmd('fontSize', this.value); this.selectedIndex=0;" title="大小">
        <option value="">大小</option>

      <div class="toolbar-sep"></div>

      <button class="toolbar-btn" title="清除格式" onclick="execCmd('removeFormat')">T<sub>x</sub></button>
      <div class="toolbar-sep"></div>

      <button class="toolbar-btn" title="背景色" onclick="promptColor('hiliteColor')">A<span style="display:block;height:3px;background:#ff0;width:14px;margin-top:-2px;"></span></button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" title="无序列表" onclick="execCmd('insertUnorderedList')">☰</button>
      <button class="toolbar-btn" title="有序列表" onclick="execCmd('insertOrderedList')">≡</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" title="居左" onclick="execCmd('justifyLeft')">☷</button>
      <button class="toolbar-btn" title="居中" onclick="execCmd('justifyCenter')">☰</button>
      <button class="toolbar-btn" title="居右" onclick="execCmd('justifyRight')">☷</button>
      <button class="toolbar-btn" title="两端对齐" onclick="execCmd('justifyFull')">☰</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" title="插入链接" onclick="insertLink()">🔗</button>
      <button class="toolbar-btn" title="插入图片" onclick="insertImage()">🖼</button>

      <div class="toolbar-sep"></div>

    </div>

    <!-- Use iframe for editor to properly isolate and render pasted styles -->
    <div class="editor-iframe-wrap">
      <iframe id="editorFrame"></iframe>

    <!-- Status Bar -->

      <span>body</span> &nbsp; <span>p</span> &nbsp; | &nbsp;

    </div>
  </div>

  <!-- Bottom Actions -->
  <div class="bottom-actions">
    <button class="btn-bottom" onclick="countWords()">统计字数</button>
    <button class="btn-bottom" onclick="fixTypos()">文字纠错</button>
    <button class="btn-bottom" onclick="convertSimplified()">简繁转换</button>
    <button class="btn-bottom" onclick="saveFile()">保存文件</button>

  <!-- Info Section -->

    <h2>H排版</h2>
    <p>一键排版网络编辑工具，轻松实现一键排版清除文章中加粗、下划线、斜体、带色、链接、样式、多余代码等干扰元素，将文章一键排版编辑成阅读体验更好的文章样式。</p>

<script>
// ============================================================
// IFRAME-BASED EDITOR
// Using an iframe so that pasted <style> tags and CSS classes
// are rendered correctly inside the editor (just like UEditor).
// ============================================================

const iframe = document.getElementById('editorFrame');
let editorDoc, editorBody;
let isSourceMode = false;

// Initialize the iframe editor
function initEditor() {
  editorDoc = iframe.contentDocument || iframe.contentWindow.document;
  editorDoc.open();
  editorDoc.write(`
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="UTF-8">
      <style>
        /* Base editor styles */
        html, body {
          margin: 0;
          padding: 0;
          font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
          font-size: 16px;
          line-height: 1.8;
          color: #333;
          word-wrap: break-word;
          overflow-wrap: break-word;
        }
        body {
          padding: 16px 20px;
          min-height: 360px;
        }
        body:empty::before {
          content: "请将文章粘贴到此处，然后点击右上角「一键排版」按钮...";
          color: #bbb;
          font-size: 15px;
        }
        p { margin-bottom: 0.8em; }
        img { max-width: 100%; height: auto; }
        a { color: #27ae60; }

        /* Default table styles — ensures tables always have visible borders
           even if the pasted HTML has no inline styles on them */
        table {
          border-collapse: collapse;
          width: 100%;
          margin: 10px 0;
        }
        table, th, td {
          border: 1px solid #ddd;
        }
        th, td {
          padding: 10px 14px;
          vertical-align: middle;
          text-align: left;
          font-size: 14px;
          line-height: 1.7;
        }
        th {
          background: #f5f7f9;
          font-weight: 600;
          color: #1a1a1a;
        }
        tr:hover th { background: #eaecef; }
        tr:hover td { background: #f8f9fa; }
      </style>
    </head>
    <body contenteditable="true"></body>
    </html>
  `);
  editorDoc.close();

  editorBody = editorDoc.body;

  // Auto-resize iframe height to content
  const resizeObserver = new ResizeObserver(() => {
    const h = editorBody.scrollHeight;
    iframe.style.height = Math.max(400, h + 40) + 'px';
  });
  resizeObserver.observe(editorBody);

  // Also resize on input
  editorBody.addEventListener('input', () => {
    const h = editorBody.scrollHeight;
    iframe.style.height = Math.max(400, h + 40) + 'px';
    updateCharCount();
  });

  // ======= KEY FIX: Handle paste events inside the iframe =======
  // When the user pastes HTML that contains <style> tags, we need to
  // extract those <style> blocks and inject them into the iframe's <head>,
  // then insert the remaining HTML body content into the editor.
  editorBody.addEventListener('paste', function(e) {
    const clipboardData = e.clipboardData || window.clipboardData;
    if (!clipboardData) return;

    const html = clipboardData.getData('text/html');
    if (!html) return; // Let plain-text paste happen normally

    e.preventDefault(); // We'll handle the insertion ourselves

    // Extract all <style> blocks
    const styleRegex = /<style[^>]*>([\s\S]*?)<\/style>/gi;
    let match;
    let styles = '';
    while ((match = styleRegex.exec(html)) !== null) {
      styles += match[0] + '\n';
    }

    // Remove <style> blocks from HTML to get the body content
    let bodyHTML = html.replace(styleRegex, '');

    // Try to extract just the <body> content if full HTML document was pasted
    const bodyMatch = bodyHTML.match(/<body[^>]*>([\s\S]*)<\/body>/i);
    if (bodyMatch) {
      bodyHTML = bodyMatch[1];
    }

    // Inject extracted <style> blocks into the iframe's <head>
    if (styles) {
      // Remove any previously injected paste styles
      const oldPasteStyles = editorDoc.head.querySelectorAll('.paste-injected-style');
      oldPasteStyles.forEach(el => el.remove());

      const styleContainer = editorDoc.createElement('div');
      styleContainer.innerHTML = styles;
      const styleTags = styleContainer.querySelectorAll('style');
      styleTags.forEach(tag => {
        tag.classList.add('paste-injected-style');
        editorDoc.head.appendChild(tag);
      });
    }

    // Insert the HTML content at cursor position
    // Use insertHTML command for proper cursor handling
    editorDoc.execCommand('insertHTML', false, bodyHTML);

    // Resize
    setTimeout(() => {
      iframe.style.height = Math.max(400, editorBody.scrollHeight + 40) + 'px';
      updateCharCount();
    }, 100);
  });

  // Load demo content
  loadDemoContent();
}

// ============ Editor Helper Functions ============

function getEditorHTML() {
  return editorBody ? editorBody.innerHTML : '';
}

function setEditorHTML(html) {
  if (!editorBody) return;

  // Extract and inject styles
  const styleRegex = /<style[^>]*>([\s\S]*?)<\/style>/gi;
  let match;
  let styles = '';
  while ((match = styleRegex.exec(html)) !== null) {
    styles += match[0] + '\n';
  }

  let bodyHTML = html.replace(styleRegex, '');
  const bodyMatch = bodyHTML.match(/<body[^>]*>([\s\S]*)<\/body>/i);
  if (bodyMatch) {
    bodyHTML = bodyMatch[1];
  }

  if (styles) {
    const oldPasteStyles = editorDoc.head.querySelectorAll('.paste-injected-style');
    oldPasteStyles.forEach(el => el.remove());

    const styleContainer = document.createElement('div');
    styleContainer.innerHTML = styles;
    const styleTags = styleContainer.querySelectorAll('style');
    styleTags.forEach(tag => {
      tag.classList.add('paste-injected-style');
      editorDoc.head.appendChild(tag);
    });
  }

  editorBody.innerHTML = bodyHTML;

  setTimeout(() => {
    iframe.style.height = Math.max(400, editorBody.scrollHeight + 40) + 'px';
    updateCharCount();
  }, 50);
}

function getEditorText() {
  return editorBody ? (editorBody.innerText || editorBody.textContent || '') : '';
}

// Execute command on the iframe document
function execCmd(cmd, value = null) {
  if (!editorDoc) return;
  editorDoc.execCommand(cmd, false, value);
  editorBody.focus();
}

// Toggle source code view
function toggleSource() {
  if (!editorBody) return;
  if (isSourceMode) {
    editorBody.innerHTML = editorBody.innerText;
    isSourceMode = false;
  } else {
    editorBody.innerText = editorBody.innerHTML;
    isSourceMode = true;
  }
}

function promptColor(cmd) {
  const color = prompt('请输入颜色值（如 #ff0000 或 red）:', '#e74c3c');
  if (color) execCmd(cmd, color);
}

function insertLink() {
  const url = prompt('请输入链接地址:', 'https://');
  if (url) execCmd('createLink', url);
}

function insertImage() {
  const url = prompt('请输入图片地址:', 'https://');
  if (url) execCmd('insertImage', url);
}

function toggleFullscreen() {
  const wrapper = document.querySelector('.editor-wrapper');
  if (!document.fullscreenElement) {
    wrapper.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}

function updateCharCount() {
  const text = getEditorText();
  const count = text.replace(/\s/g, '').length;
  document.getElementById('charCount').textContent = '字数：' + count;
}

// ============ Core Feature: One-Click Format ============
function formatContent() {
  let html = getEditorHTML();
  if (!html.trim()) {
    showToast('编辑器内无内容，请先粘贴文章');
    return;
  }

  const keepBold = document.getElementById('opt-keep-bold').checked;
  const keepLink = document.getElementById('opt-keep-link').checked;
  const keepTable = document.getElementById('opt-keep-table').checked;
  const imgCenter = document.getElementById('opt-img-center').checked;
  const indent = document.getElementById('opt-indent').checked;

  // Remove all style/class/id attributes
  html = html.replace(/ style="[^"]*"/gi, '');
  html = html.replace(/ class="[^"]*"/gi, '');
  html = html.replace(/ id="[^"]*"/gi, '');

  // Remove color/font/span tags
  html = html.replace(/<font[^>]*>/gi, '');
  html = html.replace(/<\/font>/gi, '');
  html = html.replace(/<span[^>]*>/gi, '');
  html = html.replace(/<\/span>/gi, '');

  // Handle bold
  if (!keepBold) {
    html = html.replace(/<\/?b>/gi, '');
    html = html.replace(/<\/?strong>/gi, '');
  }

  // Handle links
  if (!keepLink) {
    html = html.replace(/<a[^>]*>(.*?)<\/a>/gi, '$1');
  } else {
    html = html.replace(/<a\s+[^>]*href="([^"]*)"[^>]*>/gi, '<a href="$1" target="_blank">');
  }

  // Handle tables
  if (!keepTable) {
    html = html.replace(/<table[^>]*>[\s\S]*?<\/table>/gi, '');
  }

  // Remove underline, italic, strikethrough
  html = html.replace(/<\/?u>/gi, '');
  html = html.replace(/<\/?i>/gi, '');
  html = html.replace(/<\/?em>/gi, '');
  html = html.replace(/<\/?s>/gi, '');
  html = html.replace(/<\/?strike>/gi, '');
  html = html.replace(/<\/?del>/gi, '');

  // Remove misc tags
  html = html.replace(/<\/?center>/gi, '');
  html = html.replace(/<\/?marquee[^>]*>/gi, '');

  // Clean empty tags (two passes)
  html = html.replace(/<(\w+)[^>]*>\s*<\/\1>/gi, '');
  html = html.replace(/<(\w+)[^>]*>\s*<\/\1>/gi, '');

  // Remove excessive <br>
  html = html.replace(/(<br\s*\/?\s*>){3,}/gi, '<br><br>');
  html = html.replace(/\n{3,}/g, '\n\n');

  // Process with DOM
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = html;

  // Process images
  if (imgCenter) {
    tempDiv.querySelectorAll('img').forEach(img => {
      img.removeAttribute('style');
      img.removeAttribute('class');
      img.style.display = 'block';
      img.style.margin = '10px auto';
      img.style.maxWidth = '100%';
    });
  }

  // Process paragraphs
  if (indent) {
    tempDiv.querySelectorAll('p').forEach(p => {
      if (p.textContent.trim()) {
        p.style.textIndent = '2em';
      }
    });
  }

  // Add consistent paragraph styling
  tempDiv.querySelectorAll('p').forEach(p => {
    p.style.lineHeight = '1.8';
    p.style.marginBottom = '0.8em';
    p.style.fontSize = '16px';
    p.style.color = '#333';
  });

  // Remove previously injected paste styles since we've stripped all classes
  if (editorDoc) {
    const oldPasteStyles = editorDoc.head.querySelectorAll('.paste-injected-style');
    oldPasteStyles.forEach(el => el.remove());
  }

  // Set the cleaned HTML (no <style> tags needed now since all classes removed)
  editorBody.innerHTML = tempDiv.innerHTML;

  setTimeout(() => {
    iframe.style.height = Math.max(400, editorBody.scrollHeight + 40) + 'px';
    updateCharCount();
  }, 50);

  showToast('✓ 一键排版完成！');
}

// ============ Paste / Copy ============
async function pasteFromClipboard() {
  try {
    const clipboardItems = await navigator.clipboard.read();
    for (const item of clipboardItems) {
      if (item.types.includes('text/html')) {
        const blob = await item.getType('text/html');
        const html = await blob.text();
        setEditorHTML(html);
        showToast('✓ 已从剪贴板粘贴');
        return;
      }
      if (item.types.includes('text/plain')) {
        const blob = await item.getType('text/plain');
        const text = await blob.text();
        setEditorHTML(text.split('\n').map(l => '<p>' + l + '</p>').join(''));
        showToast('✓ 已从剪贴板粘贴');
        return;
      }
    }
  } catch (e) {
    try {
      const text = await navigator.clipboard.readText();
      if (text) {
        setEditorHTML(text.split('\n').map(l => '<p>' + l + '</p>').join(''));
        showToast('✓ 已从剪贴板粘贴');
      }
    } catch (e2) {
      showToast('请使用 Ctrl+V 在编辑框内手动粘贴');
    }
  }
}

async function copyToClipboard() {
  try {
    const html = getEditorHTML();
    const text = getEditorText();
    const htmlBlob = new Blob([html], { type: 'text/html' });
    const textBlob = new Blob([text], { type: 'text/plain' });
    await navigator.clipboard.write([
      new ClipboardItem({
        'text/html': htmlBlob,
        'text/plain': textBlob
      })
    ]);
    showToast('✓ 已复制到剪贴板');
  } catch (e) {
    // Fallback: select all content in iframe
    const range = editorDoc.createRange();
    range.selectNodeContents(editorBody);
    const sel = iframe.contentWindow.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    editorDoc.execCommand('copy');
    sel.removeAllRanges();
    showToast('✓ 已复制到剪贴板');
  }
}

function countWords() {
  const text = getEditorText();
  const chinese = (text.match(/[\u4e00-\u9fa5]/g) || []).length;
  const english = (text.match(/[a-zA-Z]+/g) || []).length;
  const numbers = (text.match(/\d+/g) || []).length;
  const total = text.replace(/\s/g, '').length;
  alert(
    `字数统计：\n\n` +
    `总字符数：${total}\n` +
    `中文字数：${chinese}\n` +
    `英文单词：${english}\n` +
    `数字个数：${numbers}`
  );
}

function fixTypos() {
  const typoMap = {
    '洁白无暇': '洁白无瑕', '黄梁美梦': '黄粱美梦',
    '一愁莫展': '一筹莫展', '穿流不息': '川流不息',
    '不记其数': '不计其数', '走头无路': '走投无路',
    '迫不急待': '迫不及待', '再接再励': '再接再厉',
    '美仑美奂': '美轮美奂', '不能自己': '不能自已',
    '按步就班': '按部就班', '兴高彩烈': '兴高采烈',
    '墨守陈规': '墨守成规', '名付其实': '名副其实',
    '委屈求全': '委曲求全', '世外桃园': '世外桃源',
    '鬼计多端': '诡计多端', '谈笑风声': '谈笑风生',
    '一股作气': '一鼓作气', '浮想联篇': '浮想联翩',
    '出奇不意': '出其不意', '既往不究': '既往不咎',
    '嘻皮笑脸': '嬉皮笑脸',
  };

  let html = getEditorHTML();
  let count = 0;

  for (const [wrong, correct] of Object.entries(typoMap)) {
    const regex = new RegExp(wrong, 'g');
    const matches = html.match(regex);
    if (matches) {
      count += matches.length;
      html = html.replace(regex, `<span style="background:#ffe082;color:#d32f2f;border-bottom:2px solid #d32f2f;">${correct}</span>`);
    }
  }

  editorBody.innerHTML = html;
  showToast(count > 0 ? `✓ 已纠正 ${count} 处错误` : '未发现常见错别字');
}

function saveFile() {
  // Gather any injected styles from the iframe head
  let injectedStyles = '';
  if (editorDoc) {
    const pasteTags = editorDoc.head.querySelectorAll('.paste-injected-style');
    pasteTags.forEach(tag => { injectedStyles += tag.outerHTML + '\n'; });
  }

  const html = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>排版文章</title>
${injectedStyles}
</head>
<body>
${getEditorHTML()}
</body>
</html>`;
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '排版文章_' + new Date().toISOString().slice(0,10) + '.html';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ 文件已保存');
}

// ============ Toast ============
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}
